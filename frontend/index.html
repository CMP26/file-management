<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NexaLearn Test Console</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --panel: #ffffff;
      --panel-soft: #eef4f0;
      --ink: #17211d;
      --muted: #63706a;
      --line: #d9dfda;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --warn: #b7791f;
      --bad: #b42318;
      --good: #1f7a3b;
      --chip: #e8ece8;
      --shadow: 0 10px 28px rgba(23, 33, 29, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      padding: 0 12px;
      white-space: nowrap;
    }

    button:hover {
      border-color: var(--accent);
      color: var(--accent-strong);
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button.primary:hover {
      background: var(--accent-strong);
      color: #fff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 64px;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 244, 0.94);
      backdrop-filter: blur(12px);
      padding: 0 22px;
    }

    .brand {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 10px;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: 20px;
      line-height: 1.1;
    }

    h2 {
      font-size: 15px;
      line-height: 1.2;
    }

    h3 {
      font-size: 14px;
      line-height: 1.25;
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
    }

    .column {
      display: grid;
      align-content: start;
      gap: 16px;
      min-width: 0;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      min-width: 0;
      overflow: clip;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
    }

    .panel-body {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .row > * {
      flex: 0 0 auto;
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      background: var(--chip);
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      padding: 3px 9px;
      text-transform: uppercase;
    }

    .status.ready {
      background: #e4f4e9;
      color: var(--good);
    }

    .status.failed {
      background: #fde8e7;
      color: var(--bad);
    }

    .status.pending,
    .status.extracting_audio,
    .status.transcribing,
    .status.labeling_topics,
    .status.generating_questions,
    .status.summarizing {
      background: #fff2d8;
      color: var(--warn);
    }

    .video-list {
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 288px);
      overflow: auto;
      padding-right: 2px;
    }

    .video-item {
      display: grid;
      gap: 8px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      text-align: left;
    }

    .video-item.active {
      border-color: var(--accent);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .video-title {
      overflow-wrap: anywhere;
      font-weight: 750;
    }

    .metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .metric {
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 12px;
      padding: 4px 8px;
    }

    .details {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(260px, 0.9fr);
      gap: 16px;
    }

    .artifact {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .text-block {
      max-height: 220px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
      color: #2c3833;
      line-height: 1.45;
      padding: 10px;
      white-space: pre-wrap;
    }

    .question-list {
      display: grid;
      gap: 12px;
    }

    .topic-block {
      display: grid;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .topic-block:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .question {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }

    .choice {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      color: var(--ink);
      font-weight: 500;
    }

    .choice input {
      width: 16px;
      margin-top: 3px;
    }

    .result-list {
      display: grid;
      gap: 8px;
    }

    .result-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .log {
      max-height: 240px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #17211d;
      color: #edf4f0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      padding: 10px;
      white-space: pre-wrap;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      padding: 14px;
      text-align: center;
    }

    .danger {
      color: var(--bad);
    }

    .ok {
      color: var(--good);
    }

    @media (max-width: 980px) {
      .grid,
      .details {
        grid-template-columns: 1fr;
      }

      .video-list {
        max-height: 360px;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 12px;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .grid {
        padding: 10px;
      }

      .split,
      .result-item {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>NexaLearn Test Console</h1>
        <span class="subtle" id="apiBaseLabel"></span>
      </div>
      <div class="toolbar">
        <span class="status" id="healthStatus">checking</span>
        <span class="status" id="llmStatus">llm</span>
        <button id="healthBtn" type="button">Health</button>
        <button id="llmBtn" type="button">LLM</button>
        <button id="refreshBtn" type="button">Refresh</button>
        <label class="choice" title="Refresh video status every 5 seconds">
          <input id="autoRefresh" type="checkbox">
          <span>Auto</span>
        </label>
      </div>
    </header>

    <section class="grid">
      <aside class="column">
        <section class="panel">
          <div class="panel-header">
            <h2>Upload</h2>
          </div>
          <form class="panel-body" id="uploadForm">
            <label>
              Title
              <input id="videoTitle" name="title" type="text" placeholder="Lecture 01" required>
            </label>
            <label>
              Video file
              <input id="videoFile" name="file" type="file" accept="video/*,audio/*" required>
            </label>
            <button class="primary" id="uploadBtn" type="submit">Upload</button>
          </form>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Videos</h2>
            <span class="subtle" id="videoCount">0</span>
          </div>
          <div class="panel-body">
            <div class="video-list" id="videoList"></div>
          </div>
        </section>
      </aside>

      <section class="column">
        <section class="panel">
          <div class="panel-header">
            <h2>Selected Video</h2>
            <span class="status" id="selectedStatus">none</span>
          </div>
          <div class="panel-body" id="detailsPanel"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Questions</h2>
            <div class="row">
              <select id="typeFilter" aria-label="Question type">
                <option value="">All types</option>
                <option value="mcq">MCQ</option>
                <option value="true_false">True/False</option>
                <option value="essay">Essay</option>
              </select>
              <button id="loadQuestionsBtn" type="button" disabled>Load</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="row">
              <label style="min-width: min(100%, 330px);">
                User ID
                <input id="userId" type="text">
              </label>
              <button id="startAttemptBtn" type="button" disabled>Start Attempt</button>
              <span class="subtle" id="attemptLabel">No attempt</span>
            </div>
            <div class="question-list" id="questionList"></div>
            <div class="row">
              <button class="primary" id="submitBtn" type="button" disabled>Submit Answers</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Results</h2>
            <span class="subtle" id="scoreLabel"></span>
          </div>
          <div class="panel-body">
            <div class="result-list" id="resultList"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>API Log</h2>
            <button id="clearLogBtn" type="button">Clear</button>
          </div>
          <div class="panel-body">
            <pre class="log" id="log"></pre>
          </div>
        </section>
      </section>
    </section>
  </main>

  <script>
    const defaultApiBase = window.location.origin === "null" ? "http://localhost:8080" : window.location.origin;
    const state = {
      apiBase: defaultApiBase,
      videos: [],
      selectedVideoId: null,
      selectedDetail: null,
      questions: [],
      attemptId: null,
      lastResults: null,
      timer: null
    };

    const el = {
      apiBaseLabel: document.querySelector("#apiBaseLabel"),
      healthStatus: document.querySelector("#healthStatus"),
      llmStatus: document.querySelector("#llmStatus"),
      healthBtn: document.querySelector("#healthBtn"),
      llmBtn: document.querySelector("#llmBtn"),
      refreshBtn: document.querySelector("#refreshBtn"),
      autoRefresh: document.querySelector("#autoRefresh"),
      uploadForm: document.querySelector("#uploadForm"),
      uploadBtn: document.querySelector("#uploadBtn"),
      videoTitle: document.querySelector("#videoTitle"),
      videoFile: document.querySelector("#videoFile"),
      videoList: document.querySelector("#videoList"),
      videoCount: document.querySelector("#videoCount"),
      selectedStatus: document.querySelector("#selectedStatus"),
      detailsPanel: document.querySelector("#detailsPanel"),
      typeFilter: document.querySelector("#typeFilter"),
      loadQuestionsBtn: document.querySelector("#loadQuestionsBtn"),
      userId: document.querySelector("#userId"),
      startAttemptBtn: document.querySelector("#startAttemptBtn"),
      attemptLabel: document.querySelector("#attemptLabel"),
      questionList: document.querySelector("#questionList"),
      submitBtn: document.querySelector("#submitBtn"),
      scoreLabel: document.querySelector("#scoreLabel"),
      resultList: document.querySelector("#resultList"),
      log: document.querySelector("#log"),
      clearLogBtn: document.querySelector("#clearLogBtn")
    };

    el.apiBaseLabel.textContent = state.apiBase;
    el.userId.value = localStorage.getItem("nexalearnUserId") || crypto.randomUUID();
    localStorage.setItem("nexalearnUserId", el.userId.value);

    function log(message, data) {
      const time = new Date().toLocaleTimeString();
      const body = data === undefined ? "" : "\n" + JSON.stringify(data, null, 2);
      el.log.textContent = `[${time}] ${message}${body}\n\n${el.log.textContent}`;
    }

    function setBusy(button, busy, label) {
      button.disabled = busy;
      if (label) {
        button.dataset.idleText = button.dataset.idleText || button.textContent;
        button.textContent = busy ? label : button.dataset.idleText;
      }
    }

    async function api(path, options = {}) {
      const url = `${state.apiBase}${path}`;
      let response;
      try {
        response = await fetch(url, options);
      } catch (error) {
        throw new Error(`Could not reach ${url}. Open the console from ${state.apiBase}/ and confirm the backend is running.`);
      }
      const contentType = response.headers.get("content-type") || "";
      const body = contentType.includes("application/json") ? await response.json() : await response.text();
      if (!response.ok) {
        const message = body && body.message ? body.message : `${response.status} ${response.statusText}`;
        throw new Error(message);
      }
      return body;
    }

    async function checkHealth() {
      try {
        const body = await api("/healthz");
        el.healthStatus.textContent = body;
        el.healthStatus.className = "status ready";
      } catch (error) {
        el.healthStatus.textContent = "offline";
        el.healthStatus.className = "status failed";
        log("Health check failed", { error: error.message });
      }
    }

    async function checkLlm() {
      try {
        const data = await api("/api/llm/status");
        el.llmStatus.textContent = data.reachable ? "llm ok" : "llm down";
        el.llmStatus.className = data.reachable ? "status ready" : "status failed";
        log("LLM status", data);
      } catch (error) {
        el.llmStatus.textContent = "llm down";
        el.llmStatus.className = "status failed";
        log("LLM status failed", { error: error.message });
      }
    }

    async function refreshVideos(quiet = false) {
      try {
        const data = await api("/api/videos");
        state.videos = data.videos || [];
        renderVideos();
        if (state.selectedVideoId) {
          await selectVideo(state.selectedVideoId, true);
        }
        if (!quiet) {
          log("Videos refreshed", data);
        }
      } catch (error) {
        log("Refresh failed", { error: error.message });
      }
    }

    async function uploadVideo(event) {
      event.preventDefault();
      const file = el.videoFile.files[0];
      if (!file) {
        return;
      }
      const form = new FormData();
      form.append("title", el.videoTitle.value.trim() || file.name);
      form.append("file", file);

      setBusy(el.uploadBtn, true, "Uploading");
      try {
        const data = await api("/api/videos/upload", {
          method: "POST",
          body: form
        });
        log("Upload queued", data);
        state.selectedVideoId = data.video_id;
        el.uploadForm.reset();
        await refreshVideos(true);
        await selectVideo(data.video_id);
      } catch (error) {
        log("Upload failed", { error: error.message });
      } finally {
        setBusy(el.uploadBtn, false);
      }
    }

    function renderVideos() {
      el.videoCount.textContent = `${state.videos.length}`;
      if (!state.videos.length) {
        el.videoList.innerHTML = '<div class="empty">No videos</div>';
        return;
      }

      el.videoList.innerHTML = "";
      for (const video of state.videos) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `video-item ${video.id === state.selectedVideoId ? "active" : ""}`;
        button.innerHTML = `
          <div class="row" style="justify-content: space-between;">
            <span class="video-title"></span>
            <span class="status ${cssToken(video.status)}">${escapeHtml(video.status)}</span>
          </div>
          <div class="subtle">${escapeHtml(shortId(video.id))} - ${formatDate(video.created_at)}</div>
          <div class="metrics">
            <span class="metric">${video.topic_count} topics</span>
            <span class="metric">${video.question_count} questions</span>
            <span class="metric">${video.has_summary ? "summary" : "no summary"}</span>
          </div>
        `;
        button.querySelector(".video-title").textContent = video.title;
        button.addEventListener("click", () => selectVideo(video.id));
        el.videoList.appendChild(button);
      }
    }

    async function selectVideo(videoId, quiet = false) {
      try {
        const detail = await api(`/api/videos/${videoId}`);
        state.selectedVideoId = videoId;
        state.selectedDetail = detail;
        state.questions = [];
        state.attemptId = quiet ? state.attemptId : null;
        state.lastResults = quiet ? state.lastResults : null;
        renderVideos();
        renderDetails();
        if (!quiet) {
          renderQuestions();
          renderAttempt();
          renderResults();
          log("Video selected", detail);
        }
      } catch (error) {
        log("Video load failed", { video_id: videoId, error: error.message });
      }
    }

    function renderDetails() {
      const detail = state.selectedDetail;
      if (!detail) {
        el.selectedStatus.textContent = "none";
        el.selectedStatus.className = "status";
        el.detailsPanel.innerHTML = '<div class="empty">Select a video</div>';
        el.loadQuestionsBtn.disabled = true;
        el.startAttemptBtn.disabled = true;
        return;
      }

      const video = detail.video;
      el.selectedStatus.textContent = video.status;
      el.selectedStatus.className = `status ${cssToken(video.status)}`;
      el.loadQuestionsBtn.disabled = video.question_count === 0;
      el.startAttemptBtn.disabled = video.question_count === 0;

      el.detailsPanel.innerHTML = `
        <div class="details">
          <div class="artifact">
            <h3>${escapeHtml(video.title)}</h3>
            <div class="metrics">
              <span class="metric">${escapeHtml(video.id)}</span>
              <span class="metric">${video.topic_count} topics</span>
              <span class="metric">${video.question_count} questions</span>
              <span class="metric">${formatDate(video.created_at)}</span>
            </div>
            ${video.error_msg ? `<div class="danger">${escapeHtml(video.error_msg)}</div>` : ""}
            <div class="artifact">
              <h3>Summary</h3>
              <div class="text-block">${escapeHtml(detail.summary || "Not generated yet")}</div>
            </div>
          </div>
          <div class="artifact">
            <h3>Transcript Preview</h3>
            <div class="text-block">${escapeHtml(detail.transcript_preview || "Not transcribed yet")}</div>
          </div>
        </div>
      `;
    }

    async function loadQuestions() {
      if (!state.selectedVideoId) {
        return;
      }
      const params = new URLSearchParams();
      if (el.typeFilter.value) {
        params.set("type", el.typeFilter.value);
      }
      const suffix = params.toString() ? `?${params.toString()}` : "";
      setBusy(el.loadQuestionsBtn, true, "Loading");
      try {
        const data = await api(`/api/videos/${state.selectedVideoId}/questions${suffix}`);
        state.questions = flattenQuestions(data);
        state.attemptId = null;
        state.lastResults = null;
        renderQuestions(data);
        renderAttempt();
        renderResults();
        log("Questions loaded", data);
      } catch (error) {
        log("Question load failed", { error: error.message });
      } finally {
        setBusy(el.loadQuestionsBtn, false);
      }
    }

    function flattenQuestions(data) {
      return (data.topics || []).flatMap((topic) =>
        (topic.questions || []).map((question) => ({ ...question, topic }))
      );
    }

    function renderQuestions(data) {
      if (!state.selectedVideoId) {
        el.questionList.innerHTML = '<div class="empty">Select a video</div>';
        el.submitBtn.disabled = true;
        return;
      }
      if (!data || !state.questions.length) {
        el.questionList.innerHTML = '<div class="empty">No loaded questions</div>';
        el.submitBtn.disabled = true;
        return;
      }

      el.questionList.innerHTML = "";
      for (const topic of data.topics || []) {
        const block = document.createElement("section");
        block.className = "topic-block";
        block.innerHTML = `<h3>${escapeHtml(topic.label)}</h3>`;

        for (const question of topic.questions || []) {
          const node = document.createElement("article");
          node.className = "question";
          node.dataset.questionId = question.id;
          node.dataset.questionType = question.question_type;
          node.innerHTML = `
            <div class="row" style="justify-content: space-between;">
              <strong>${escapeHtml(question.stem)}</strong>
              <span class="metric">${escapeHtml(question.question_type)}${question.difficulty ? " / " + escapeHtml(question.difficulty) : ""}</span>
            </div>
            <div class="answer-slot"></div>
          `;

          const slot = node.querySelector(".answer-slot");
          if (question.choices && question.choices.length) {
            for (const choice of question.choices) {
              const label = document.createElement("label");
              label.className = "choice";
              label.innerHTML = `
                <input type="radio" name="answer_${question.id}" value="${escapeHtml(choice.label)}">
                <span><strong>${escapeHtml(choice.label)}.</strong> ${escapeHtml(choice.text)}</span>
              `;
              slot.appendChild(label);
            }
          } else {
            slot.innerHTML = `<textarea name="answer_${question.id}" placeholder="Answer"></textarea>`;
          }
          block.appendChild(node);
        }

        el.questionList.appendChild(block);
      }
      el.submitBtn.disabled = !state.attemptId;
    }

    async function startAttempt() {
      if (!state.selectedVideoId) {
        return;
      }
      localStorage.setItem("nexalearnUserId", el.userId.value.trim());
      setBusy(el.startAttemptBtn, true, "Starting");
      try {
        const data = await api(`/api/videos/${state.selectedVideoId}/exams/start`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ user_id: el.userId.value.trim() })
        });
        state.attemptId = data.attempt_id;
        renderAttempt();
        el.submitBtn.disabled = !state.questions.length;
        log("Attempt started", data);
      } catch (error) {
        log("Attempt start failed", { error: error.message });
      } finally {
        setBusy(el.startAttemptBtn, false);
      }
    }

    async function submitAnswers() {
      if (!state.attemptId) {
        return;
      }
      const answers = [];
      for (const question of state.questions) {
        const value = answerValue(question);
        if (!value) {
          log("Submit blocked", { missing_question_id: question.id });
          return;
        }
        answers.push({ question_id: question.id, user_answer: value });
      }

      setBusy(el.submitBtn, true, "Submitting");
      try {
        const data = await api(`/api/exams/${state.attemptId}/submit`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ answers })
        });
        state.lastResults = data;
        renderResults();
        log("Attempt submitted", data);
      } catch (error) {
        log("Submit failed", { error: error.message });
      } finally {
        setBusy(el.submitBtn, false);
      }
    }

    function answerValue(question) {
      const radio = document.querySelector(`input[name="answer_${question.id}"]:checked`);
      if (radio) {
        return radio.value;
      }
      const text = document.querySelector(`textarea[name="answer_${question.id}"]`);
      return text ? text.value.trim() : "";
    }

    function renderAttempt() {
      el.attemptLabel.textContent = state.attemptId ? shortId(state.attemptId) : "No attempt";
      el.submitBtn.disabled = !(state.attemptId && state.questions.length);
    }

    function renderResults() {
      const results = state.lastResults;
      el.scoreLabel.textContent = results ? `Total ${results.total_score}` : "";
      if (!results) {
        el.resultList.innerHTML = '<div class="empty">No results</div>';
        return;
      }

      el.resultList.innerHTML = "";
      for (const item of results.breakdown || []) {
        const question = state.questions.find((entry) => entry.id === item.question_id);
        const row = document.createElement("div");
        row.className = "result-item";
        row.innerHTML = `
          <span>${escapeHtml(question ? question.stem : item.question_id)}</span>
          <span class="${item.is_correct ? "ok" : "danger"}">${item.score}</span>
          <button type="button">Justify</button>
        `;
        row.querySelector("button").addEventListener("click", () => loadJustification(item.answer_id));
        el.resultList.appendChild(row);
      }
    }

    async function loadJustification(answerId) {
      if (!state.attemptId) {
        return;
      }
      try {
        const data = await api(`/api/exams/${state.attemptId}/answers/${answerId}/justification`);
        log("Justification", data);
      } catch (error) {
        log("Justification failed", { answer_id: answerId, error: error.message });
      }
    }

    function toggleAutoRefresh() {
      if (state.timer) {
        clearInterval(state.timer);
        state.timer = null;
      }
      if (el.autoRefresh.checked) {
        state.timer = setInterval(() => refreshVideos(true), 5000);
      }
    }

    function shortId(id) {
      return id ? `${id.slice(0, 8)}...${id.slice(-4)}` : "";
    }

    function cssToken(value) {
      return String(value || "").replace(/[^a-z0-9_-]/gi, "_");
    }

    function formatDate(value) {
      return value ? new Date(value).toLocaleString() : "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    el.healthBtn.addEventListener("click", checkHealth);
    el.llmBtn.addEventListener("click", checkLlm);
    el.refreshBtn.addEventListener("click", () => refreshVideos());
    el.autoRefresh.addEventListener("change", toggleAutoRefresh);
    el.uploadForm.addEventListener("submit", uploadVideo);
    el.loadQuestionsBtn.addEventListener("click", loadQuestions);
    el.startAttemptBtn.addEventListener("click", startAttempt);
    el.submitBtn.addEventListener("click", submitAnswers);
    el.clearLogBtn.addEventListener("click", () => { el.log.textContent = ""; });
    el.userId.addEventListener("change", () => localStorage.setItem("nexalearnUserId", el.userId.value.trim()));

    checkHealth();
    checkLlm();
    refreshVideos(true);
    renderDetails();
    renderQuestions();
    renderResults();
  </script>
</body>
</html>
