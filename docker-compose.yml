services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexalearn
      POSTGRES_USER: nexalearn
      POSTGRES_PASSWORD: nexalearn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexalearn -d nexalearn"]
      interval: 5s
      timeout: 5s
      retries: 20

  rustfs:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  rustfs-init:
    image: minio/mc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: /bin/sh
    command: -c "mc alias set local http://rustfs:9000 minio minio12345 && mc mb -p local/nexalearn || true && mc anonymous set private local/nexalearn"

  whisper:
    build:
      context: ./services/whisper_service
    environment:
      WHISPER_MODEL_SIZE: base
      WHISPER_LANGUAGE: en
    ports:
      - "8000:8000"
    volumes:
      - whisper_model_cache:/root/.cache

  backend:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
      whisper:
        condition: service_started
    environment:
      RUST_LOG: info
      DATABASE_URL: postgres://nexalearn:nexalearn@postgres:5432/nexalearn
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_BUCKET: nexalearn
      RUSTFS_ACCESS_KEY: minio
      RUSTFS_SECRET_KEY: minio12345
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio12345
      AWS_REGION: us-east-1
      GEMMA_BASE_URL: http://host.docker.internal:8100
      GEMMA_MODEL: gemma3
      WHISPER_URL: http://whisper:8000
      TMP_DIR: /tmp/nexalearn
      BIND_ADDR: 0.0.0.0:8080
    ports:
      - "8080:8080"
    volumes:
      - backend_tmp:/tmp/nexalearn
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres-ui:
    image: adminer:4
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
  rustfs_data:
  backend_tmp:
  whisper_model_cache:
